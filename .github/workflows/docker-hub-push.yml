name: Push to Docker Hub

on:
  push:
    branches:
      - main
      - feat/tor-node
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'start.sh'
      - '.dockerignore'
      - '.github/workflows/docker-hub-push.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: libre7/gupax-docker

jobs:
  push-to-dockerhub:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Detect Gupax version from upstream
        id: version
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/gupax-io/gupax/releases/latest)
          VERSION=$(echo "$VERSION" | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          echo "Latest Gupax version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=,suffix=
            type=sha,prefix=,suffix=
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref_name == 'main' }}
          flavor: |
            latest=${{ github.ref_name == 'main' }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
