name: Docker Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/w111a/gupax-docker
  GUPAX_REPO: gupax-io/gupax

jobs:
  detect-version:
    name: Detect latest Gupax version
    runs-on: ubuntu-latest
    outputs:
      guax_version: ${{ steps.version.outputs.GUPAX_VERSION }}
      guax_sha256: ${{ steps.sha256.outputs.GUPAX_SHA256 }}
    steps:
      - name: Fetch latest Gupax version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/${{ env.GUPAX_REPO }}/releases/latest | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          echo "GUPAX_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Gupax version: $VERSION"

      - name: Fetch SHA256 for linux-x64 binary
        id: sha256
        run: |
          SHA=$(curl -s https://github.com/${{ env.GUPAX_REPO }}/releases/download/${{ steps.version.outputs.GUPAX_VERSION }}/SHA256SUMS | grep 'linux-x64.tar.gz' | awk '{print $1}')
          echo "GUPAX_SHA256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

  build-and-push:
    needs: detect-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args:
            - GUPAX_VERSION=${{ needs.detect-version.outputs.guax_version }}
            - GUPAX_SHA256=${{ needs.detect-version.outputs.guax_sha256 }}
          tags:
            - ${{ env.IMAGE_NAME }}:latest
            - ${{ env.IMAGE_NAME }}:${{ needs.detect-version.outputs.guax_version }}
            - ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
