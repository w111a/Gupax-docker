version: "3.8"

services:
  gupax:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GUPAX_VERSION: ${GUPAX_VERSION:-v2.0.1}
        GUPAX_SHA256: ${GUPAX_SHA256:-67abf40f8c452f637a45644f3b80815cdc44f55e45bc3901d7f66179d65495d5}
    image: ghcr.io/w111a/gupax-docker:latest
    container_name: gupax
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      - WALLET_ADDRESS=${WALLET_ADDRESS:?WALLET_ADDRESS must be set}
    volumes:
      - gupax-config:/home/miner/.local/state/gupax
      - ${MONERO_DATA_PATH:-gupax-monero}:/home/miner/.bitmonero
    ports:
      - "6080:6080"   # noVNC web interface
      - "5900:5900"   # VNC server (optional)
      - "3333:3333"   # P2Pool stratum server
      - "37889:37889" # P2Pool Monero node ZMQ
      - "18080:18080" # Monero P2P
      - "18081:18081" # Monero RPC
      - "18082:18082" # Monero RPC ZMQ
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gupax-config:
  gupax-monero:
