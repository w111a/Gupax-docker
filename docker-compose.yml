services:
  gupax:
    build:
      context: .
      dockerfile: Dockerfile
      # GUPAX_VERSION and GUPAX_SHA256 are detected automatically at build time
    image: ghcr.io/w111a/gupax-docker:latest
    container_name: gupax
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      - TOR_ENABLED=false   # Set to true to enable Tor SOCKS5 + hidden service
      # - VNC_PASSWORD=change-me  # Uncomment to require VNC password
    volumes:
      - gupax-config:/home/miner/.local/share/gupax
      - ${MONERO_DATA_PATH:-gupax-monero}:/home/miner/.bitmonero
      # - gupax-tor:/home/miner/.tor  # Uncomment for persistent .onion address
    ports:
      - "6080:6080"   # noVNC web interface
      - "5900:5900"   # VNC server (optional)
      - "3333:3333"   # P2Pool stratum server
      - "37889:37889" # P2Pool Monero node ZMQ
      - "18080:18080" # Monero P2P
      - "18081:18081" # Monero RPC
      - "18082:18082" # Monero RPC ZMQ
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gupax-config:
  gupax-monero:
  gupax-tor: